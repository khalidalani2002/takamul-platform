<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | TAKAMUL</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="frosted-theme" data-page="achievements">
    
    <div id="preloader">
        <img src="logo.png" alt="Takamul Loading" class="preloader-logo">
    </div>

    <nav class="navbar">
        <div class="logo-container">
            <a href="index.html"><img src="logo.png" alt="Takamul Logo" class="brand-logo"></a>
        </div>
        <div class="mobile-menu-btn" onclick="toggleMenu()"><i class="ph ph-dots-three-vertical"></i></div>
        <div class="nav-links" id="nav-links">
            <i class="ph ph-x close-menu-btn" onclick="toggleMenu()"></i>
            <a href="achievement.html" style="color: #FF5C00;">Achievement</a>
            <a href="team.html">Team</a>
            <a href="about.html">About us</a>
            <a href="contact.html">Contact</a>
            <button class="btn-lang" onclick="toggleLanguage()">🌐 AR / EN</button>
            <button class="btn-login" onclick="document.getElementById('login-modal').style.display='flex'; toggleMenu();">Log In</button>
        </div>
    </nav>

    <div class="page-container" style="opacity: 1 !important; visibility: visible !important;">
        <h1 class="page-title">Our Achievements</h1>
        <p class="page-subtitle">The milestones and stories that define our journey.</p>
        
        <div class="marquee-container" id="marquee-section" style="display: none; opacity: 1 !important; visibility: visible !important;">
            <div class="marquee-content" id="marquee-track">
                </div>
        </div>

        <div id="blog-container" class="blog-grid" style="opacity: 1 !important; visibility: visible !important;">
            </div>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('login-modal').style.display='none'">&times;</span>
            <h2 style="color: #111;">System Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-orange" onclick="checkLogin()">Access Dashboard</button>
            <p id="error-msg" style="color: #ff4d4d; display: none; margin-top: 10px;">Access Denied</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
