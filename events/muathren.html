<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تكامل — شبكة المؤثرين</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="muathren.css" />
</head>
<body class="moathren">
  <header class="site-header">
    <a href="index.html" class="brand-link"><img src="images/logo.png" class="brand-logo" alt="Takamul" /></a>
    <nav class="nav">
      <a href="about.html">Services</a>
      <a href="events.html">Events</a>
      <a href="muathren.html" class="active">Influencers</a>
    </nav>
  </header>

  <div class="bg-layer" id="bgLayer"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-glow"></div>
    <img src="images/logo.png" class="hero-logo" alt="Takamul" />
    <p class="tagline">شبكة المؤثرين المختارة بعناية</p>
    <p class="sub-tagline">نحو حملات مؤثرة… بنتائج حقيقية</p>
    <div class="scroll-hint">
      <span></span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- INTRO QUOTE -->
  <section class="quote-section">
    <div class="section-label">القيمة الحقيقية</div>
    <div class="quote-wrap">
      <span class="q-open">"</span>
      <p class="quote-text scroll-type" data-text="في تكامل… الأسماء التي نمتلكها ليسوا مجرد مؤثرين، بل هم أدوات تأثير."></p>
      <span class="q-close">"</span>
    </div>
  </section>

  <!-- INFLUENCERS -->
  <section class="network">
    <div class="section-header">
      <div class="section-label">الشبكة الحصرية</div>
      <h2 class="scroll-type" data-text="أقوى المؤثرين في العراق"></h2>
      <div class="section-divider"></div>
    </div>

    <div class="grid" id="grid"></div>
  </section>

  <!-- CLOSING -->
  <section class="closing">
    <div class="silver-bar"></div>
    <p class="closing-line scroll-type" data-text="في تكامل… نحن لا نبيع إعلان، نحن نصنع تأثيرًا حقيقيًا."></p>
    <p class="closing-sub">دعنا نبني حملتك القادمة.</p>
    <img src="images/logo.png" class="hero-logo small" alt="Takamul" />
  </section>

  <footer class="moathren-footer">
    <p>© TAKAMUL — شبكة المؤثرين المختارة بعناية</p>
  </footer>

  <script src="muathren.js"></script>
  <script src="effects.js"></script>
</body>
</html>
