  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    /* Style 3 — wireframe / blueprint planets with orbital rings */
    @keyframes spin { to { transform: rotate(360deg); } }
    .orb, .orb-lg {
      filter: none;
      opacity: 0.85;
      background: radial-gradient(circle at 50% 50%, rgba(150,190,255,0.05), transparent 70%);
      border: 1.5px solid rgba(190,215,255,0.55);
      box-shadow: 0 0 14px rgba(150,190,255,0.28), inset 0 0 14px rgba(150,190,255,0.12);
      animation: spin var(--odur, 40s) linear infinite;
    }
    .orb::before, .orb-lg::before {
      content: "";
      position: absolute;
      inset: -30% -58%;
      border-radius: 50%;
      border: 1px solid rgba(185,212,255,0.42);
      transform: rotate(-24deg);
      pointer-events: none;
    }
    .orb::after, .orb-lg::after {
      content: "";
      position: absolute;
      inset: -48% -74%;
      border-radius: 50%;
      border: 1px dashed rgba(185,212,255,0.22);
      transform: rotate(-24deg);
      pointer-events: none;
    }
  </style>
</head>

    <p class="sub-tagline">Background style 3 — Wireframe</p>
    <div class="scroll-hint"><span></span><div class="scroll-line"></div></div>
  </section>

  <main class="page">
