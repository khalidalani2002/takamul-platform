        inset -12px -10px 26px rgba(0,0,0,0.72),
        inset 5px 5px 13px rgba(255,255,255,0.14),
        0 0 20px rgba(200,200,210,0.06);
      animation: orbFloat var(--odur, 40s) ease-in-out infinite;
