<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Takamul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand-link"><img src="images/logo.png" class="brand-logo" alt="Takamul" /></a>
    <nav class="nav">
      <a href="about.html">Services</a>
      <a href="events.html">Events</a>
      <a href="muathren.html">Influencers</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <main class="page">
    <p id="status" class="status"></p>

    <!-- Login -->
    <section id="login-view" hidden>
      <h1>Admin Login</h1>
      <form id="login-form" class="form">
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit" class="btn-primary">Sign in</button>
      </form>
    </section>

    <!-- Builder -->
    <section id="admin-view" hidden>
      <div class="admin-bar">
        <h1 id="builder-title">Builder</h1>
        <div class="admin-user">
          <span id="who" class="muted"></span>
          <button id="logout" class="btn-ghost">Log out</button>
        </div>
      </div>

      <div class="pb-settings">
        <select id="category">
          <option value="events">Events</option>
          <option value="about">Services</option>
        </select>
        <input id="title" type="text" placeholder="Name / title" dir="auto" />
        <label class="date-field"><span>Event date (optional)</span>
          <input id="event-date" type="date" />
        </label>
        <div class="cover-field">
          <span class="cover-label">Main photo</span>
          <div id="cover-drop" class="cover-drop">
            <input id="cover-file" type="file" accept="image/*" hidden />
            <div id="cover-prev" class="cover-prev">Click to set main photo</div>
          </div>
        </div>
      </div>

      <div class="pb-devicebar">
        <div class="device-toggle">
          <button type="button" data-dev="desktop" class="on" title="Desktop">🖥</button>
          <button type="button" data-dev="tablet" title="Tablet">▭</button>
          <button type="button" data-dev="mobile" title="Mobile">📱</button>
        </div>
        <div class="pb-actions">
          <button type="button" id="new-btn" class="btn-ghost">＋ New</button>
          <button type="button" id="save-btn" class="btn-primary">Publish</button>
        </div>
      </div>

      <div class="pb-wrap">
        <aside class="pb-palette">
          <span class="palette-title">Elements</span>
          <div id="palette" class="palette-list">
            <div class="widget" data-widget="heading">▤&nbsp; Topic</div>
            <div class="widget" data-widget="text">☰&nbsp; Text</div>
            <div class="widget" data-widget="image">🖼&nbsp; Photo</div>
            <div class="widget" data-widget="video">🎬&nbsp; Video</div>
            <div class="widget" data-widget="album">▦&nbsp; Album</div>
            <div class="widget" data-widget="photobar">🎞&nbsp; Photo bar</div>
            <div class="widget" data-widget="button">🔗&nbsp; Button</div>
            <div class="widget" data-widget="spacer">↕&nbsp; Spacer</div>
          </div>
          <span class="palette-hint">Drag an element onto the canvas →</span>
        </aside>

        <div class="pb-main">
          <div class="pb-stage desktop">
            <div id="canvas" class="pb-canvas"></div>
            <button type="button" id="add-row" class="add-row-btn">+ Add row</button>
          </div>
        </div>
      </div>

      <h2 class="stages-title">Existing posts</h2>
      <div id="post-list" class="post-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script type="module" src="js/builder.js?v=6"></script>
</body>
</html>
