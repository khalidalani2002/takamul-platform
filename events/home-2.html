<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Home Style 2 — Neon Gas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Style 2 — neon glowing gas giants */
    .orb {
      filter: none;
      opacity: 0.95;
      background: radial-gradient(circle at 35% 32%, #c8f9ff 0%, #38d0ff 32%, #6a5cff 70%, #241a63 100%);
      box-shadow:
        0 0 22px 4px rgba(80,190,255,0.55),
        0 0 60px 12px rgba(120,90,255,0.32),
        inset -6px -8px 18px rgba(0,0,12,0.55);
      animation: orbFloat var(--odur, 40s) ease-in-out infinite;
    }
    .orb-lg {
      filter: none;
      opacity: 0.9;
      background: radial-gradient(circle at 38% 34%, #ffe0f6 0%, #ff5ccf 34%, #a13cff 72%, #2c1050 100%);
      box-shadow:
        0 0 30px 6px rgba(255,90,205,0.5),
        0 0 80px 16px rgba(160,60,255,0.3),
        inset -8px -10px 22px rgba(10,0,20,0.55);
      animation: orbFloat var(--odur, 40s) ease-in-out infinite;
    }
    .orb::before, .orb-lg::before {
      content: "";
      position: absolute;
      inset: -22%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(90,190,255,0.28), transparent 68%);
      filter: blur(8px);
      pointer-events: none;
    }
    .orb-lg::before { background: radial-gradient(circle, rgba(255,90,205,0.26), transparent 68%); }
  </style>
</head>
