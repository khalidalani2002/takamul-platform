<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 { color: #fff; margin-bottom: 30px; font-size: 1.5rem; }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: #888; }
        .login-box input::placeholder { color: #666; }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #888;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 5px;
        }
        .login-box button:hover { opacity: 0.85; }
        #error-msg { color: #ff4d4d; display: none; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Access</h2>
        <input type="text" id="username" placeholder="Username" autocomplete="username">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <button onclick="checkLogin()">Sign In</button>
        <p id="error-msg">Invalid credentials. Access Denied.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
